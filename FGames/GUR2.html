<!DOCTYPE html>
<html lang="en-us">
  <head>
    <link rel="icon" type="image/x-icon" href="Media/Imgs/Bliss_(Windows_XP).png\" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <title>My Harmony Portal</title>
    
  </head>
  <body>
    <div id="container"></div>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.addEventListener("load", (event) => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    const container = document.getElementById("container");
    container.appendChild(player);
    player.load({
      url: "SWFs/bloonstd4.swf", // Replace with the path to your .swf file
      backgroundColor: "#000",
    });
    player.style.width = "1280px"; // Set your desired width
    player.style.height = "960px"; // Set your desired height
  });
</script>

</body>
</html>
